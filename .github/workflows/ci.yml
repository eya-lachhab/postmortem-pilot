name: 🧪 CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🔍 Lint with ruff
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running ruff linter..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ruff check postmortem_pilot/ --fix
          ruff format postmortem_pilot/

      - name: 🔎 Type check with mypy
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running mypy type checker..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mypy postmortem_pilot/

      - name: 🧪 Run tests with pytest
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running test suite..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pytest tests/ -v

      - name: 📊 Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # Fun job: celebrate when CI passes 🎉
  celebrate:
    name: 🎉 CI Passed!
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Party time
        run: |
          echo ""
          echo "  ██████╗ ██╗   ██╗██╗██╗     ████████╗██╗"
          echo "  ██╔══██╗██║   ██║██║██║        ██╔══╝██║"
          echo "  ██████╔╝██║   ██║██║██║        ██║   ██║"
          echo "  ██╔══██╗██║   ██║██║██║        ██║   ╚═╝"
          echo "  ██████╔╝╚██████╔╝██║███████╗   ██║   ██╗"
          echo "  ╚═════╝  ╚═════╝ ╚═╝╚══════╝   ╚═╝   ╚═╝"
          echo ""
          echo "  All tests passed. Ship it. ✈"
          echo ""
