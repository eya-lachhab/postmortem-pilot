name: 🚨 Postmortem Pilot — Auto-generate deploy report

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      before_ref:
        description: "Git ref before deploy (e.g. HEAD~1 or commit SHA)"
        required: false
        default: "HEAD~1"
      after_ref:
        description: "Git ref after deploy (e.g. HEAD or commit SHA)"
        required: false
        default: "HEAD"
      log_file:
        description: "Path to log file (leave empty to use example_logs/sample.log)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  postmortem:
    name: 📋 Generate Postmortem
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install postmortem-pilot
        run: |
          pip install -e ".[dev]"

      - name: 🔍 Run postmortem-pilot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          BEFORE="${{ github.event.inputs.before_ref || 'HEAD~1' }}"
          AFTER="${{ github.event.inputs.after_ref || 'HEAD' }}"
          LOG_FILE="${{ github.event.inputs.log_file }}"

          echo "================================================"
          echo "  postmortem-pilot starting"
          echo "  Diff: $BEFORE -> $AFTER"
          echo "  Logs: ${LOG_FILE:-example_logs/sample.log}"
          echo "================================================"

          if [ -n "$LOG_FILE" ]; then
            postmortem-pilot run \
              --before "$BEFORE" \
              --after "$AFTER" \
              --log-file "$LOG_FILE" \
              --output postmortem.md
          else
            postmortem-pilot run \
              --before "$BEFORE" \
              --after "$AFTER" \
              --output postmortem.md
          fi

      - name: 📤 Upload postmortem artifact
        uses: actions/upload-artifact@v4
        with:
          name: postmortem-report
          path: postmortem.md
          if-no-files-found: error
